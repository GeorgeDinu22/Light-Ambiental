<script>
  document.addEventListener("DOMContentLoaded", () => {
    // Se selectează toate elementele cu clasa .container-poza
    const images = document.querySelectorAll(".container-poza img");

    // Se creează un observator de intersecție
    const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                // Când imaginea devine vizibilă, adaugă o clasă (de exemplu, "visible")
                entry.target.classList.toggle("appear");

                // Dacă dorești să oprești observarea după ce imaginea a devenit vizibilă:
                observer.unobserve(entry.target);
            }
        });
    }, {
        threshold:1 // procentul de vizibilitate necesar (10% vizibil)
    });

    // Se adaugă observatorul pentru fiecare imagine
    images.forEach(img => observer.observe(img));
});
</script>
